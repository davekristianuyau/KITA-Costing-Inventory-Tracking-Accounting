# Nginx edge config (SCAFFOLDING SKELETON).
# Role: serve the built React static assets, apply caching/compression, and reverse-proxy
# /api/* to the Spring Cloud Gateway. TLS/DNS are handled upstream by feature 001's cloud LB.
# Implemented/tuned in a later feature.

worker_processes auto;

events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/css application/javascript application/json image/svg+xml;

  upstream gateway {
    # Overridden via env/compose; placeholder default.
    server gateway:8081;
  }

  server {
    listen 8080;
    server_name _;

    # Static React assets (long cache for hashed files).
    location /assets/ {
      root /usr/share/nginx/html;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # API → gateway.
    location /api/ {
      proxy_pass http://gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback.
    location / {
      root /usr/share/nginx/html;
      try_files $uri /index.html;
    }
  }
}
