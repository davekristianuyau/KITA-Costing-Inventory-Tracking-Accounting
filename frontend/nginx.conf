# Nginx: serve the built React SPA and reverse-proxy /auth + /api to the edge gateway (the single public
# entry point). Only the frontend is host-exposed; the edge and everything behind it stay on the internal
# network. TLS/DNS are handled upstream by feature 001's cloud LB.

worker_processes auto;

events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/css application/javascript application/json image/svg+xml;

  upstream edge {
    # Overridden via compose DNS; the edge gateway listens on 8080.
    server edge:8080;
  }

  server {
    listen 8080;
    server_name _;

    # Liveness for the container healthcheck.
    location = /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # Static React assets (long cache for hashed files).
    location /assets/ {
      root /usr/share/nginx/html;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Auth + API → edge gateway (forwards the httpOnly session cookie).
    location /auth/ {
      proxy_pass http://edge;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/ {
      proxy_pass http://edge;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback.
    location / {
      root /usr/share/nginx/html;
      try_files $uri /index.html;
    }
  }
}
