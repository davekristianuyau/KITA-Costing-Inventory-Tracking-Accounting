openapi: 3.0.3
info:
  title: KITA procurement-service API
  version: 0.1.0
  description: >
    Supplier master + purchase-order lifecycle + receiving + restock. Behind the gateway. Money as
    decimal strings. Also serves as the supplier Party master referenced by operations-service.
servers:
  - url: /api/procurement
tags: [ { name: suppliers }, { name: purchase-orders }, { name: receiving }, { name: restock } ]
paths:
  /suppliers:
    get: { tags: [suppliers], summary: List/search suppliers, responses: { '200': { description: OK } } }
    post:
      tags: [suppliers]
      summary: Create a supplier
      responses: { '201': { description: Created }, '400': { description: Validation error }, '409': { description: Duplicate supplier_code } }
  /suppliers/{id}:
    get: { tags: [suppliers], summary: Get a supplier (used by operations-service party validation), responses: { '200': { description: OK }, '404': { description: Not found } } }
    patch: { tags: [suppliers], summary: Update supplier (history retained), responses: { '200': { description: OK } } }
  /suppliers/{id}/items:
    post: { tags: [suppliers], summary: Add/update a supplied item (price, lead time, min order), responses: { '201': { description: Created } } }

  /purchase-orders:
    get: { tags: [purchase-orders], summary: List POs (filter by supplier/status), responses: { '200': { description: OK } } }
    post: { tags: [purchase-orders], summary: Create a PO (DRAFT) with lines; totals computed, responses: { '201': { description: Created }, '400': { description: Validation error } } }
  /purchase-orders/{id}:
    get: { tags: [purchase-orders], summary: Get a PO, responses: { '200': { description: OK }, '404': { description: Not found } } }
  /purchase-orders/{id}/approve:
    post: { tags: [purchase-orders], summary: Approve (threshold-gated), responses: { '200': { description: Approved }, '403': { description: Approver required over threshold }, '409': { description: Illegal transition } } }
  /purchase-orders/{id}/send:
    post: { tags: [purchase-orders], summary: Send to supplier (locks lines), responses: { '200': { description: Sent }, '409': { description: Illegal transition } } }
  /purchase-orders/{id}/cancel:
    post: { tags: [purchase-orders], summary: Cancel (no inventory effect), responses: { '200': { description: Cancelled }, '409': { description: Already received } } }
  /purchase-orders/{id}/receipts:
    post:
      tags: [receiving]
      summary: Record a (partial/full) goods receipt; emits a goods-receipt event to operations-service
      responses: { '201': { description: Recorded; PO advanced }, '409': { description: Over-receipt or illegal state } }

  /restock/suggestions:
    post: { tags: [restock], summary: Generate restock suggestions from low-stock signals, responses: { '200': { description: OK, suggestions grouped by supplier } } }
    get: { tags: [restock], summary: List open suggestions, responses: { '200': { description: OK } } }
  /restock/suggestions/{id}/convert:
    post: { tags: [restock], summary: Convert a suggestion into a draft PO, responses: { '201': { description: PO created } } }

  /actuator/health:
    get: { summary: Health check, responses: { '200': { description: UP } } }
