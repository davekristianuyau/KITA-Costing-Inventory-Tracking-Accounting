# Local containerized backend stack (008-docker-cache-database).
# Only the gateway is host-exposed (8081); Postgres/Redis/services stay on the internal `kita` network.
# Opt into DB/Redis host ports with docker-compose.override.yml (see .example).
# Pinned engine versions match production for parity. Secrets come from `.env` (never committed).
#
# Scope note: reference-service (empty skeleton) and the frontend (not yet specced) are intentionally
# out of scope and not started here.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kita}
      POSTGRES_USER: ${POSTGRES_USER:-kita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env.example)}
    volumes:
      - kita-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-kita} -d $${POSTGRES_DB:-kita}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [kita]      # not host-exposed (opt-in via override)

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - kita-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [kita]      # not host-exposed (opt-in via override)

  operations-service:
    build:
      context: ./backend
      dockerfile: operations-service/Dockerfile
    environment:
      DATABASE_URL: ${OPERATIONS_DATABASE_URL:-jdbc:postgresql://postgres:5432/kita?currentSchema=operations,public}
      DATABASE_USER: ${DATABASE_USER:-kita}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required (see .env.example)}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      PARTY_STUB: ${PARTY_STUB:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks: [kita]      # private — no host port published

  hr-service:
    build:
      context: ./backend
      dockerfile: hr-service/Dockerfile
    environment:
      DATABASE_URL: ${HR_DATABASE_URL:-jdbc:postgresql://postgres:5432/kita?currentSchema=hr,public}
      DATABASE_USER: ${DATABASE_USER:-kita}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required (see .env.example)}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks: [kita]

  crm-service:
    build:
      context: ./backend
      dockerfile: crm-service/Dockerfile
    environment:
      DATABASE_URL: ${CRM_DATABASE_URL:-jdbc:postgresql://postgres:5432/kita?currentSchema=crm,public}
      DATABASE_USER: ${DATABASE_USER:-kita}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required (see .env.example)}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks: [kita]

  procurement-service:
    build:
      context: ./backend
      dockerfile: procurement-service/Dockerfile
    environment:
      DATABASE_URL: ${PROCUREMENT_DATABASE_URL:-jdbc:postgresql://postgres:5432/kita?currentSchema=procurement,public}
      DATABASE_USER: ${DATABASE_USER:-kita}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required (see .env.example)}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks: [kita]

  workflow-service:
    build:
      context: ./backend
      dockerfile: workflow-service/Dockerfile
    environment:
      DATABASE_URL: ${WORKFLOW_DATABASE_URL:-jdbc:postgresql://postgres:5432/kita?currentSchema=workflow,public}
      DATABASE_USER: ${DATABASE_USER:-kita}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required (see .env.example)}
      # Orchestrate the REAL services, so a governed action taken in the console has real effects that
      # show up in that service's own tab (016 SC-007). The in-memory adapters are a build/test seam for
      # `:workflow-service:test` running without the rest of the stack — not a runtime mode.
      OPERATIONS_ADAPTER: ${OPERATIONS_ADAPTER:-http}
      CRM_ADAPTER: ${CRM_ADAPTER:-http}
      PROCUREMENT_ADAPTER: ${PROCUREMENT_ADAPTER:-http}
      # HR stays on the seeded directory: nothing yet maps a login account to an employee record, so the
      # http adapter would need the login name to BE the employee UUID. Closing that gap is spec 017.
      HR_ADAPTER: ${HR_ADAPTER:-fake}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks: [kita]

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    ports:
      - "8081:8081"      # the ONLY host-exposed service — the public entry point (FR-008)
    depends_on:
      operations-service:
        condition: service_healthy
      hr-service:
        condition: service_healthy
      crm-service:
        condition: service_healthy
      procurement-service:
        condition: service_healthy
      workflow-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks: [kita]

volumes:
  kita-pgdata:
  kita-redisdata:

networks:
  kita:
    driver: bridge
