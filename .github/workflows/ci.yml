name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # ubuntu-latest provides a working Docker daemon for Testcontainers (unix socket),
      # so the Windows/Docker-Desktop workaround in operations-service is inert here.
      - name: Build, test and lint backend
        working-directory: backend
        run: ./gradlew :operations-service:build --no-daemon
