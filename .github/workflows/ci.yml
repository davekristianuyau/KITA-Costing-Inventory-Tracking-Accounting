name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # ubuntu-latest provides a working Docker daemon for Testcontainers (unix socket),
      # so the Windows/Docker-Desktop workaround in operations-service is inert here.
      - name: Build, test and lint backend/
        working-directory: backend
        run: ./gradlew :operations-service:build :hr-service:build :crm-service:build :procurement-service:build :workflow-service:build :identity-service:build :edge-gateway:build :gateway:build :session-verify:build --no-daemon

  # Frontend (009): type-check, unit tests (Vitest), production build.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, test and build frontend/
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

  # Full containerized stack smoke test (008): build all images, health-gated up, schema isolation,
  # datastores private. Uses the runner's Docker daemon.
  stack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check local<->prod parity (pins + schemas)
        run: bash scripts/check-parity.sh
      - name: Bring up the stack and smoke-test it
        env:
          POSTGRES_PASSWORD: ci-postgres
          DATABASE_PASSWORD: ci-postgres
        run: bash scripts/stack-smoke.sh

  # Full multi-client login/routing simulation (009): two isolated client stacks + identity + edge +
  # frontend, then the smoke test (health, only-frontend-exposed, per-client login → own backend).
  # Heavy (~13 images) → NON-BLOCKING, as planned; the auth/routing/isolation logic is unit/IT-covered above.
  sim-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Bring up the sim and smoke-test it
        run: |
          bash sim/sim-up.sh
          bash sim/sim-smoke.sh
      - name: Tear down
        if: always()
        run: bash sim/sim-down.sh || true

  # Deploy the REAL 001 Terraform against local Floci emulators — apply → verify → destroy, no real cloud
  # (010). AWS deploys the near-complete module; GCP/Azure are deferred (their Floci emulators cover only
  # storage/secrets — see sim/cloud-deploy/coverage/). Heavy (starts an emulator + real apply) → NON-BLOCKING.
  cloud-deploy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Deploy the 001 modules to Floci (apply → verify → destroy)
        run: bash sim/cloud-deploy/run-all.sh

  # Full service-console environment (011): floci-aws WITH the Docker socket (real compute) + the Floci UI,
  # the client's imitated AWS deploy, and the 009 backend/edge/frontend, then the console smoke (console
  # reachable → login → run the reference function → Floci UI reachable → only-frontend+UI exposed → 0 real
  # cloud). Heavy (starts an emulator + real deploy) → NON-BLOCKING; the console logic is unit-covered above.
  console-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Bring up the console and smoke-test it (self-teardown)
        run: bash sim/console/console-smoke.sh

  # Blocking infra quality gates (Principle VII, FR-006). No cloud credentials needed.
  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt (check)
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: terraform validate
        run: |
          terraform -chdir=infra/terraform init -backend=false
          terraform -chdir=infra/terraform validate

      - uses: terraform-linters/setup-tflint@v4
      - name: tflint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # plugin downloads
        run: |
          tflint --init
          tflint --recursive

      - name: Infra contract tests
        run: bash tests/run.sh contract
