# Gateway configuration (SCAFFOLDING SKELETON).
# Static routes are added here when the gateway is implemented. All values are env-overridable.
server:
  port: 8081

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # - id: reference-service
        #   uri: ${REFERENCE_SERVICE_URL:http://reference-service:8082}
        #   predicates:
        #     - Path=/api/reference/**
        - id: operations-service
          uri: ${OPERATIONS_SERVICE_URL:http://operations-service:8083}
          predicates:
            - Path=/api/operations/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
