server:
  port: 8083

spring:
  application:
    name: operations-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kita?currentSchema=operations,public}
    username: ${DATABASE_USER:kita}
    password: ${DATABASE_PASSWORD:change-me}
    hikari:
      # search_path so unqualified SQL (incl. tests) resolves to this service's schema, public second
      # for shared extensions. Applies at runtime and under Testcontainers (which override only the url).
      connection-init-sql: SET search_path TO operations, public
  jpa:
    hibernate:
      ddl-auto: validate   # schema owned by Flyway
    open-in-view: false
    properties:
      hibernate:
        default_schema: operations
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: operations   # Flyway creates + owns this service's schema (history lives here)
    schemas: operations
    create-schemas: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

operations:
  party:
    base-url: ${PARTY_SERVICE_URL:http://party-service:8084}
    # When true, a permissive stub is used instead of calling the Party service (dev/test only).
    stub: ${PARTY_STUB:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
