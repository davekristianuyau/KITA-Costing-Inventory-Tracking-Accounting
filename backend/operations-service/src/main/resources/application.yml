server:
  port: 8083

spring:
  application:
    name: operations-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kita}
    username: ${DATABASE_USER:kita}
    password: ${DATABASE_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: validate   # schema owned by Flyway
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

operations:
  party:
    base-url: ${PARTY_SERVICE_URL:http://party-service:8084}
    # When true, a permissive stub is used instead of calling the Party service (dev/test only).
    stub: ${PARTY_STUB:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
