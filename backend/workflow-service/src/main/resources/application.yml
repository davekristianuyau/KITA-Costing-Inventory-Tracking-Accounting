server:
  port: 8088

spring:
  application:
    name: workflow-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kita?currentSchema=workflow,public}
    username: ${DATABASE_USER:kita}
    password: ${DATABASE_PASSWORD:change-me}
    hikari:
      # search_path so unqualified SQL (incl. tests) resolves to this service's schema, public second
      # for shared extensions. Applies at runtime and under Testcontainers (which override only the url).
      connection-init-sql: SET search_path TO workflow, public
  jpa:
    hibernate:
      ddl-auto: validate # schema owned by Flyway
    open-in-view: false
    properties:
      hibernate:
        default_schema: workflow
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: workflow      # Flyway creates + owns this service's schema (history lives here)
    schemas: workflow
    create-schemas: true

workflow:
  security:
    # When true, a caller with no X-Kita-User header is resolved to a stub employee holding all
    # roles (dev/test only). Identity comes from the gateway; ROLES come from HR, never the header.
    stub: ${WORKFLOW_SECURITY_STUB:true}
  retry:
    # Bounded auto-retry for transient downstream failures before reporting unavailable (FR-018).
    max-attempts: ${WORKFLOW_RETRY_MAX_ATTEMPTS:3}
    backoff-millis: ${WORKFLOW_RETRY_BACKOFF_MILLIS:100}
  hr:
    adapter: ${HR_ADAPTER:fake} # 'fake' (default, in-memory) | 'http'
    base-url: ${HR_BASE_URL:http://hr-service:8085}
  crm:
    adapter: ${CRM_ADAPTER:fake}
    base-url: ${CRM_BASE_URL:http://crm-service:8086}
  operations:
    adapter: ${OPERATIONS_ADAPTER:fake}
    base-url: ${OPERATIONS_BASE_URL:http://operations-service:8083}
  procurement:
    adapter: ${PROCUREMENT_ADAPTER:fake}
    base-url: ${PROCUREMENT_BASE_URL:http://procurement-service:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info
