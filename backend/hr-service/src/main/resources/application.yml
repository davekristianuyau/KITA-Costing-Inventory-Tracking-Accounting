server:
  port: 8085

spring:
  application:
    name: hr-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kita?currentSchema=hr,public}
    username: ${DATABASE_USER:kita}
    password: ${DATABASE_PASSWORD:change-me}
    hikari:
      # search_path so unqualified SQL (incl. tests) resolves to this service's schema, public second
      # for shared extensions. Applies at runtime and under Testcontainers (which override only the url).
      connection-init-sql: SET search_path TO hr, public
  jpa:
    hibernate:
      ddl-auto: validate # schema owned by Flyway
    open-in-view: false
    properties:
      hibernate:
        default_schema: hr
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: hr      # Flyway creates + owns this service's schema (history table lives here)
    schemas: hr
    create-schemas: true

hr:
  security:
    # When true, callers are trusted as HR_ADMIN when no role headers are present (dev/test only).
    # In production the gateway authenticates and sets X-Kita-Roles / X-Kita-Employee-Id.
    stub: ${HR_SECURITY_STUB:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
